name: Playwright Report (GitHub Pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (with OS deps)
        run: npx playwright install --with-deps

      - name: Typecheck
        run: npm run typecheck

      # Run tests but don't stop the workflow here (so we can publish the report even on failures)
      - name: Run Playwright tests (list + html)
        id: tests
        continue-on-error: true
        run: npx playwright test --reporter=list,html

      # Prepare Pages
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload the report folder as the Pages artifact
      - name: Upload Pages artifact (playwright-report)
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # Finally, fail the workflow if tests failed
      - name: Fail job if tests failed
        if: steps.tests.outcome != 'success'
        run: exit 1
